<mat-card class="shadow hover:shadow-lg transition duration-200">
  <img
    [src]="hotel.image"
    [alt]="hotel.name"
    class="w-full h-48 object-cover rounded-t"
  />
  <mat-card-content class="p-4">
    <h2 class="text-lg font-semibold text-gray-800">{{ hotel.name }}</h2>
    <p class="text-sm text-gray-600">{{ hotel.address }}</p>

    <div class="mt-2 flex items-center gap-2 text-yellow-500">
      <ng-container *ngFor="let _ of [].constructor(hotel.stars)">
        ★
      </ng-container>
      <span class="text-xs text-gray-500">({{ hotel.rate }}/5)</span>
    </div>

    <div class="mt-4 text-right">
      <p class="text-lg font-bold text-primary">
        {{ hotel.price | currency : "EUR" }}
      </p>
    </div>
  </mat-card-content>
</mat-card>
