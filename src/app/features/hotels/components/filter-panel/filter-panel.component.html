<form [formGroup]="form" class="p-4 grid gap-4 bg-white rounded shadow-md">
  <!-- Nombre -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Nombre del hotel</mat-label>
    <input matInput formControlName="name" placeholder="Ej. Hilton" />
  </mat-form-field>

  <!-- Categoría -->
  <div>
    <p class="font-semibold text-sm mb-1">Categoría (estrellas):</p>
    <div class="flex gap-3" formGroupName="stars">
      @for (star of starCategory; track $index) {
      <ng-container>
        <mat-checkbox [formControlName]="star">{{ star }} ⭐</mat-checkbox>
      </ng-container>
      }
    </div>
  </div>

  <!-- Valoración mínima -->
  <div>
    <label class="block font-semibold text-sm mb-1">
      Valoración mínima: {{ form.get("minRating")?.value }}
    </label>
    <mat-slider min="0" max="5" step="0.1">
      <input matSliderThumb formControlName="minRating" />
    </mat-slider>
  </div>

  <!-- Precio máximo -->
  <div>
    <label class="block font-semibold text-sm mb-1">
      Precio máximo: {{ form.get("maxPrice")?.value }} €
    </label>
    <mat-slider min="50" max="1000" step="10">
      <input matSliderThumb formControlName="maxPrice" />
    </mat-slider>
  </div>
</form>
