<section class="container mx-auto px-4 py-6">
  <h1 class="text-2xl font-bold text-center text-white mb-6">
    PRUEBA TÉCNICA ANGULAR: Filtro de Hoteles
  </h1>
  <app-filter-panel (filtersChanged)="onFiltersChanged($event)" class="mb-6" />
  <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
    @for (hotel of paginatedHotels(); track hotel.id) {
    <app-hotel-card [hotel]="hotel" />
    }
  </div>
  <app-paginator
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    (pageChange)="setPage($event)"
  />
</section>
